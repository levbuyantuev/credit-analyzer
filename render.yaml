services:
  - type: web
    name: credit-analyzer-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/credit-analyzer run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: credit-analyzer-api
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: credit-analyzer-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: multiagent-consulting
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r artifacts/multiagent/requirements.txt
    startCommand: cd artifacts/multiagent && python main.py
    envVars:
      - key: PORT
        fromService:
          type: web
          name: multiagent-consulting
          property: port
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: credit-analyzer-db
    region: frankfurt
    plan: free
    databaseName: credit_analyzer
    user: credit_analyzer
